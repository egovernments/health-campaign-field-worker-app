plugins {
    id 'com.android.application'
    id 'kotlin-android'
    id 'dev.flutter.flutter-gradle-plugin'
    id 'com.google.gms.google-services'
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}


android {
    compileSdk = 34
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId "com.digit.hcm"
        // You can update the following values to match your application needs.
        // For more information, see: https://docs.flutter.dev/deployment/android#reviewing-the-build-configuration.
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    buildTypes {
        release {
            // Enable code obfuscation with R8
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            // TODO: For production release, replace signingConfigs.debug with signingConfigs.release
            // 1. Generate keystore: keytool -genkey -v -keystore my-release-key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias my-key-alias
            // 2. Create android/key.properties with storePassword, keyPassword, keyAlias, storeFile
            // 3. Add signingConfigs.release block and reference it here
            signingConfig signingConfigs.debug
        }
        
        debug {
            // Disable obfuscation for debug builds to speed up development
            minifyEnabled false
            shrinkResources false
            signingConfig signingConfigs.debug
        }
    }

    if (!project.hasProperty('USE_GOOGLE_SERVICES')) {
        tasks.whenTaskAdded { task ->
            if (task.name.contains("GoogleServices")) {
                task.enabled = false
            }
        }
    }
}

// Exclude sqlite3_flutter_libs since sqlcipher_flutter_libs is used as a drop-in replacement
// Both share the same Android package (eu.simonbinder.sqlite3_flutter_libs) causing duplicate class errors
configurations.all {
    exclude module: 'sqlite3_flutter_libs'
}

flutter {
    source '../..'
}